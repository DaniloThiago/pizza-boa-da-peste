<section class="cta" id="contato" #ctaSection>
  <div class="cta__panel">
    <div class="cta__ornament cta__ornament--left" aria-hidden="true"></div>
    <div class="cta__ornament cta__ornament--right" aria-hidden="true"></div>

    <div class="cta__content">
      <span class="eyebrow js-reveal">Bateu a fome?</span>
      <h2 class="js-reveal">
        Peça agora
        <span>uma pizza boa da peste.</span>
      </h2>
      <p class="js-reveal">
        Chama no WhatsApp e recebe um pedido com carinho, presença e sabor arretado.
      </p>

      <div class="cta__actions js-reveal">
        <a [href]="whatsappUrl" target="_blank" rel="noopener" class="btn btn-whatsapp">
          Pedir no WhatsApp
        </a>
        <a href="#cardapio" class="btn btn-secondary">Voltar aos sabores</a>
      </div>

      <div class="cta__details js-reveal">
        <span>Entrega rapida</span>
        <span>Atendimento proximo</span>
        <span>Feita com massa artesanal</span>
      </div>
    </div>
  </div>
</section>
