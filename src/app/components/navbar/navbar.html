<nav class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__inner">
    <a class="navbar__logo" href="#topo" (click)="closeMenu()" aria-label="Pizza Boa da Peste">
      <img class="navbar__logo-image" src="assets/svg/hero/logo.svg" alt="" aria-hidden="true" />
    </a>

    <ul class="navbar__links" [class.navbar__links--open]="menuOpen()">
      @for (link of navLinks; track link.href) {
        <li>
          <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      }
      <li class="navbar__links-cta">
        <a href="#contato" class="btn btn-primary" (click)="closeMenu()">Pedir agora</a>
      </li>
    </ul>

    <button
      class="navbar__burger"
      [class.navbar__burger--open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Abrir menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
